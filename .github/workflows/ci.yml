name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clik
          POSTGRES_PASSWORD: clik
          POSTGRES_DB: clik_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clik"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint

      - name: Run unit tests
        run: npm test
        env:
          DATABASE_URL: postgresql://clik:clik@localhost:5432/clik_test
          NEXTAUTH_SECRET: test-secret-not-for-production

      - run: npm run build
        env:
          DATABASE_URL: postgresql://clik:clik@localhost:5432/clik_test
          NEXTAUTH_SECRET: test-secret-not-for-production
