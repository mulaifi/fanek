services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fanek
      POSTGRES_PASSWORD: fanek
      POSTGRES_DB: fanek
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fanek"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      DATABASE_URL: postgresql://fanek:fanek@db:5432/fanek
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-}
      PORT: ${PORT:-8080}
    volumes:
      - data:/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  data:
